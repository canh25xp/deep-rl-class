# https://docs.astral.sh/ruff/configuration/
[tool.ruff]
line-length = 180 # I don't want to hard wrap long-line

[tool.ruff.format]
quote-style = "double" # Use double quotes for strings.
indent-style = "space" # Indent with spaces, rather than tabs.

[tool.ruff.lint]
ignore = ["F401", "F403", "F405", "E402"] # Ignore import warning

#https://microsoft.github.io/pyright/#/configuration?id=sample-pyprojecttoml-file
[tool.pyright]
exclude = ["**/__pycache__"]
extraPaths = []
typeCheckingMode = "standard"
reportMissingImports = true
reportMissingTypeStubs = false
reportUnknownMemberType = false
reportOptionalMemberAccess = false
reportFunctionMemberAccess = false
reportAttributeAccessIssue = false
reportGeneralTypeIssues = false
